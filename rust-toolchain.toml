[toolchain]
# Pinned to an exact stable release: a floating "stable" already broke CI once
# (rustfmt 1.9 wrapping, commit 538cd43) with zero warning. Bump deliberately —
# and bump the matching `toolchain:` input in .github/workflows/ci.yml in the
# SAME commit (the CI action does not read this file).
channel = "1.96.1"
components = ["rustfmt", "clippy"]
targets = ["aarch64-unknown-linux-gnu"]
