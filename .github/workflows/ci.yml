name: ci
on: [push, pull_request]

# Cancel superseded runs on the same ref (rapid pushes) to save CI time.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Third-party actions are pinned to a full commit SHA (immutable) with a version
# comment; .github/dependabot.yml bumps them. First-party actions/checkout is
# pinned too. dtolnay/rust-toolchain pins the `stable` branch HEAD (it still
# installs the stable toolchain — the selector is baked into the action).
jobs:
  check:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v5.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          # Keep in lockstep with rust-toolchain.toml (the action does not read
          # it): one exact version everywhere, so a stable-channel point release
          # can never break fmt/clippy under CI's feet.
          toolchain: 1.96.1
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo build --workspace
      - run: cargo test --workspace
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v5.0.0
      # Prebuilt cargo-deny (no compile-from-source every run); honors ./deny.toml.
      - uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2
  secrets:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v5.0.0
      # Run the OSS gitleaks binary directly. The gitleaks-ACTION wrapper demands a
      # paid GITLEAKS_LICENSE for org accounts and fails closed when it cannot verify
      # the account type over the GitHub API (a 404 on the user lookup) — a licensing
      # gate, not a real finding. The MIT binary needs no license and runs the same
      # default ruleset (.gitleaks.toml extends it). Pinned to a fixed version.
      - name: Install gitleaks
        run: |
          set -euo pipefail
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz" -o "$RUNNER_TEMP/gitleaks.tar.gz"
          tar -xzf "$RUNNER_TEMP/gitleaks.tar.gz" -C "$RUNNER_TEMP" gitleaks
          "$RUNNER_TEMP/gitleaks" version
      - name: Scan the tree for secrets
        run: '"$RUNNER_TEMP/gitleaks" dir --config .gitleaks.toml --redact --exit-code 1 .'
  boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v5.0.0
        with:
          # The allowlist-freeze check diffs .boundary-allow.txt against the
          # base branch, so it needs more than a shallow single-commit clone.
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.96.1
      # L3b server-side: the same content gate the pre-commit hook runs, over
      # the whole tracked tree — an unprovisioned clone is still gated here.
      - run: cargo run -q -p xtask -- scan-content --all
      # L3b freeze: a PR may not add net-new allowlist entries; exceptions land
      # only via an owner-reviewed change to the base branch.
      - name: allowlist-freeze (pull requests)
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          cargo run -q -p xtask -- allowlist-freeze --against "origin/${{ github.base_ref }}"
      # L3c: the tracked hook must still invoke the xtask gate — a hook edit
      # that drops the scanner fails here even though hooks are client-side.
      - name: the pre-commit hook still invokes the boundary gate
        run: grep -q "xtask -- scan-content --staged" scripts/githooks/pre-commit
